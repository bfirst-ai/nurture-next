kind = "web"
previewPath = "/"
title = "CPAL.pro - Tax & CPA Services"
version = "1.0.0"
id = "artifacts/cpal-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25879

[services.development]
run = "pnpm --filter @workspace/cpal-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cpal-pro", "run", "build" ]
publicDir = "artifacts/cpal-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25879"
BASE_PATH = "/"
