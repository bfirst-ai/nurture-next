<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){var t=localStorage.getItem("nurture-next-theme");document.documentElement.classList.add(t==="dark"?"dark":"light");})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Nurture Next | Premium Tax & Compliance Advisors</title>
    <meta
      name="description"
      content="Professional tax filing, GST, and business compliance managed by certified advisors with secure workflows and transparent pricing."
    />
    <meta name="theme-color" content="#0E1628" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Ask CPAL Lead Generation Widget — local bundle (copied from widget-test).
         The deployed CDN URL at /widget/askcpal-widget.js currently returns the
         client-portal SPA shell instead of the JS bundle, so we self-host here.
         data-api points at the locally-running accumax-api on :3000. -->
    <script
      src="/askcpal-widget.js?v=8"
      data-nn-widget
      data-tenant="teamtusharmt"
      data-api="http://localhost:3000/api/v1"
      async
    ></script>
  </body>
</html>
