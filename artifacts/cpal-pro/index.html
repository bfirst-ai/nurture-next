<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){var t=localStorage.getItem("nurture-next-theme");document.documentElement.classList.add(t==="dark"?"dark":"light");})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Nurture Next | Premium Tax & Compliance Advisors</title>
    <meta
      name="description"
      content="Professional tax filing, GST, and business compliance managed by certified advisors with secure workflows and transparent pricing."
    />
    <meta name="theme-color" content="#0E1628" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- ─────────────────────────────────────────────────────────────────────
         Ask CPAL Lead Generation Widget — portable embed.

         This is the canonical "paste on any website" snippet: a <script> with
         just data-tenant. The bundle is fully self-contained (React + CSS + the
         API URL are baked in), so it needs NOTHING else to run. It talks to the
         public Ask CPAL API, whose widget endpoints allow any origin (CORS '*',
         no cookies) — so the SAME snippet works on localhost, here in production,
         and on any firm's site. Do NOT add a hardcoded data-api: a localhost URL
         points every real visitor at their own machine and breaks the widget.

         To host on another site: copy this <script> tag and serve askcpal-widget.js
         from that site (or reference its public URL via an absolute src).

         LOCAL-BACKEND DEV ONLY: to test against an accumax-api running on your own
         machine, temporarily add  data-api="http://localhost:3000/api/v1"  to the
         tag below. Never commit that — it must not ship to production.
         ───────────────────────────────────────────────────────────────────── -->
    <script
      src="https://client-portal-multi-tenant.azurewebsites.net/widget/askcpal-widget.js"
      data-nn-widget
      data-tenant="tenant"
      async
    ></script>
  </body>
</html>
