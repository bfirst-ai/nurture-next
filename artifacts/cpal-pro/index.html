<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){var t=localStorage.getItem("nurture-next-theme");document.documentElement.classList.add(t==="dark"?"dark":"light");})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Nurture Next | Premium Tax & Compliance Advisors</title>
    <meta
      name="description"
      content="Professional tax filing, GST, and business compliance managed by certified advisors with secure workflows and transparent pricing."
    />
    <meta name="theme-color" content="#0E1628" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- ─────────────────────────────────────────────────────────────────────
         Ask CPAL Lead Generation Widget — NurtureNext's own site embed.

         tenant + API base are injected at build time from the Vite env
         (%VITE_WIDGET_TENANT% / %VITE_WIDGET_API%), so each environment talks to
         the right backend with the right tenant automatically:
           • local dev / staging build → .env            (tenant: nurturenext, staging API)
           • production build           → .env.production (prod tenant, prod API)
         Change tenant/backend by editing those .env files, NOT this tag.

         The bundle is self-contained (React + CSS baked in). The Ask CPAL widget
         endpoints are CORS-open (any origin, no cookies), so the same bundle runs
         on localhost, here, and on any firm's site.

         PORTABLE EMBED for OTHER firms: copy this <script>, hardcode their own
         data-tenant (and an absolute src to a hosted askcpal-widget.js), and drop
         the data-api so it uses the bundle's baked default.
         ───────────────────────────────────────────────────────────────────── -->
    <script
      src="/askcpal-widget.js"
      data-nn-widget
      data-tenant="%VITE_WIDGET_TENANT%"
      data-api="%VITE_WIDGET_API%"
      async
    ></script>
  </body>
</html>
