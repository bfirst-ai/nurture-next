<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function(){var t=localStorage.getItem("nurture-next-theme");document.documentElement.classList.add(t==="dark"?"dark":"light");})();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Nurture Next | Premium Tax & Compliance Advisors</title>
    <meta
      name="description"
      content="Professional tax filing, GST, and business compliance managed by certified advisors with secure workflows and transparent pricing."
    />
    <meta name="theme-color" content="#0E1628" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Ask CPAL Lead Generation Widget — self-mounts a floating chat launcher
         (isolated in a Shadow DOM). Bundle is built from react-client-portal
         (`npm run build:widget`) and served from the client portal. Set
         data-tenant to this site's firm slug. -->
    <script
      src="https://accumax-client-portal.azurewebsites.net/widget/askcpal-widget.js"
      data-nn-widget
      data-tenant="nurture-next"
      async
    ></script>
  </body>
</html>
